name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build
        env:
          NODE_ENV: production

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: proxy.bccdev.id
          username: dev
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 11013
          script: |
            # Navigate to project directory
            cd ~/ajisaka-2026

            # Pull latest changes
            git fetch origin
            git reset --hard origin/main

            # Install dependencies
            npm ci --production=false

            # Build project
            npm run build

            # Restart PM2 process
            pm2 restart ajisaka-2026 || pm2 start npm --name "ajisaka-2026" -- start

            # Save PM2 process list
            pm2 save

      - name: Health Check
        run: |
          sleep 10
          curl -f https://ajisaka.bccdev.id || exit 1
